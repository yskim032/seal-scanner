<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0f1e" />
    <title>TOS Web Dashboard | SealScan 실시간 전송</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <!-- MQTT 실시간 라이브러리 추가 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --bg2: #0d1528;
            --card: #111827;
            --blue: #3b82f6;
            --cyan: #06b6d4;
            --green: #10b981;
            --yellow: #f59e0b;
            --orange: #f97316;
            --red: #ef4444;
            --text: #f1f5f9;
            --sec: #94a3b8;
            --muted: #475569;
            --border: rgba(255, 255, 255, 0.07);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hdr-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .hdr-title {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.05em;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--sec);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        @media(min-width: 600px) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }

        .stat.blue {
            border-top: 2px solid var(--blue);
        }

        .stat.green {
            border-top: 2px solid var(--green);
        }

        .stat.cyan {
            border-top: 2px solid var(--cyan);
        }

        .stat.yellow {
            border-top: 2px solid var(--yellow);
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 6px;
        }

        .stat-val {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat.blue .stat-val {
            color: var(--blue);
        }

        .stat.green .stat-val {
            color: var(--green);
        }

        .stat.cyan .stat-val {
            color: var(--cyan);
        }

        .stat.yellow .stat-val {
            color: var(--yellow);
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Notification Toast for new items */
        .toast-live {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.85);
            color: #6ee7b7;
            border: 1px solid var(--green);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 900;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .toast-live.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .tx-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: card-in .5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tx-card.new-item {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .tx-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
        }

        .tx-no {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .tx-ts {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--sec);
        }

        .op-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .op-IMPORT {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
        }

        .op-EXPORT {
            background: rgba(245, 158, 11, 0.15);
            color: #fde68a;
        }

        .tx-ok {
            font-size: 0.75rem;
            color: var(--green);
            font-weight: 700;
            margin-left: 10px;
        }

        .tx-card-body {
            display: flex;
            gap: 20px;
            padding: 16px 20px;
        }

        .tx-photo {
            width: 120px;
            height: 90px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .tx-seals {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .seal-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .seal-line-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
        }

        .badge-ym {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .badge-hmm {
            background: rgba(6, 182, 212, 0.15);
            color: #67e8f9;
        }

        .badge-hl {
            background: rgba(249, 115, 22, 0.15);
            color: #fdba74;
        }

        .badge-msc {
            background: rgba(234, 179, 8, 0.15);
            color: #fde047;
        }

        .seal-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }

        .seal-conf {
            font-size: .75rem;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
        }

        .tx-meta {
            display: flex;
            gap: 3px;
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.75rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .tx-meta span {
            margin-right: 20px;
        }

        /* Photo modal */
        .photo-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .photo-modal.show {
            display: flex;
        }

        .photo-modal img {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 12px;
        }

        .empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* ── Mobile Responsive Overrides ── */
        @media(max-width: 550px) {
            header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .hdr-left {
                align-items: flex-start;
            }

            .hdr-title {
                font-size: 1rem;
            }

            main {
                padding: 20px 14px 60px;
            }

            h1 {
                font-size: 1.3rem;
            }

            .stats {
                gap: 10px;
            }

            .stat {
                padding: 14px;
            }

            .stat-val {
                font-size: 1.6rem;
            }

            .tx-card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .tx-card-body {
                flex-direction: column;
                gap: 14px;
                padding: 16px;
            }

            .seal-row {
                flex-wrap: wrap;
                gap: 6px;
            }

            .tx-meta {
                font-size: 0.7rem;
            }

            .tx-meta span {
                display: block;
                margin-bottom: 4px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="hdr-left">
            <div class="hdr-logo">📡</div>
            <div>
                <span class="hdr-title">웹 대시보드 모니터</span>
                <span style="font-size:0.7rem;color:var(--muted);">모바일 스캐너 실시간 연동</span>
            </div>
        </div>
        <div class="live-badge" id="liveBadge">
            <span class="live-dot"></span>클라우드 연결됨
        </div>
    </header>

    <main>
        <h1>실시간 TOS 전송 기록</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <p class="subtitle" style="margin-bottom:0;">모바일 기기에서 [TOS 전송]을 누르면 이 화면에 즉시 팝업됩니다.</p>
            <button onclick="clearAll()"
                style="background:rgba(239, 68, 68, 0.15); color:var(--red); border:1px solid rgba(239, 68, 68, 0.3); padding:6px 14px; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.8rem; letter-spacing:0.02em;">전체
                기록 삭제</button>
        </div>

        <div class="stats">
            <div class="stat blue">
                <div class="stat-lbl">총 전송</div>
                <div class="stat-val" id="sTotal">0</div>
            </div>
            <div class="stat green">
                <div class="stat-lbl">인식 씰</div>
                <div class="stat-val" id="sSeals">0</div>
            </div>
            <div class="stat cyan">
                <div class="stat-lbl">신뢰도</div>
                <div class="stat-val" id="sConf">—</div>
            </div>
            <div class="stat yellow">
                <div class="stat-lbl">오늘 전송</div>
                <div class="stat-val" id="sToday">0</div>
            </div>
        </div>

        <div class="cards-list" id="cardsList"></div>
        <div class="empty" id="emptyState" style="display:none">
            <div class="empty-icon">📭</div>
            <p>아직 수신된 데이터가 없습니다.<br />모바일 폰에서 카메라 앱을 켜고 스캔 전송을 테스트해 보세요.</p>
        </div>
    </main>

    <div class="toast-live" id="toastLive">📢 방금 모바일에서 새 스캔 데이터가 도착했습니다!</div>
    <div class="photo-modal" id="photoModal" onclick="this.classList.remove('show')"><img id="photoModalImg" src="" />
    </div>

    <script>
        let historyData = JSON.parse(localStorage.getItem('sealScanHistory') || '[]');

        function saveAndRender() {
            localStorage.setItem('sealScanHistory', JSON.stringify(historyData));
            renderAll();
        }

        function deleteItem(index) {
            historyData.splice(index, 1);
            saveAndRender();
        }

        function clearAll() {
            if (!confirm('정말 모든 전송 기록을 삭제하시겠습니까?')) return;
            historyData = [];
            saveAndRender();
        }

        // MQTT 클라우드 실시간 연결 (웹소켓)
        const client = mqtt.connect('wss://test.mosquitto.org:8081/mqtt');
        const TOPIC = 'sealscan/yskim032/tos_data';

        client.on('connect', () => {
            client.subscribe(TOPIC);
            console.log("웹 대시보드 - MQTT 실시간 통신 연결 완료");
        });

        client.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                // 새 데이터를 최상단에 추가
                historyData.unshift(payload);
                if (historyData.length > 50) historyData.pop();
                saveAndRender();

                // 알림 토스트 띄우기
                const toast = document.getElementById('toastLive');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);

                // 가장 첫 카드 초록색 하이라이트
                setTimeout(() => {
                    const cards = document.querySelectorAll('.tx-card');
                    if (cards[0]) cards[0].classList.add('new-item');
                }, 50);

            } catch (e) { console.error("Message parse error", e); }
        });

        function getBadgeCls(line) {
            if (line === 'YML') return 'badge-ym';
            if (line === 'HMM') return 'badge-hmm';
            if (line === 'HPL') return 'badge-hl';
            if (line === 'MSC') return 'badge-msc';
            return 'badge-ym';
        }

        function renderAll() {
            const list = document.getElementById('cardsList');
            const empty = document.getElementById('emptyState');
            let tSeals = 0, tConf = 0, cCount = 0, today = 0;
            const nowStr = new Date().toDateString();

            document.getElementById('sTotal').textContent = historyData.length;
            if (!historyData.length) {
                document.getElementById('sSeals').textContent = '0';
                document.getElementById('sConf').textContent = '—';
                document.getElementById('sToday').textContent = '0';
                list.innerHTML = ''; empty.style.display = 'block'; return;
            }
            empty.style.display = 'none';
            list.innerHTML = '';

            historyData.forEach((h, idx) => {
                (h.seals || []).forEach(s => { tSeals++; if (s.confidence) { tConf += s.confidence; cCount++; } });
                if (new Date(h.timestamp).toDateString() === nowStr) today++;

                const dt = new Date(h.timestamp);

                const sealsHtml = (h.seals || []).map(s => `
        <div class="seal-row">
          <span class="seal-line-badge ${getBadgeCls(s.shippingLine)}">${s.shippingLine || '—'}</span>
          <span class="seal-num">${s.sealNumber}</span>
          <span class="seal-conf">${s.confidence}%</span>
        </div>
      `).join('');

                const imgHtml = h.capturedImage
                    ? `<img class="tx-photo" src="${h.capturedImage}" onclick="event.stopPropagation();document.getElementById('photoModalImg').src=this.src;document.getElementById('photoModal').classList.add('show');" />`
                    : `<div style="width:120px;height:90px;flex-shrink:0;border-radius:12px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.75rem;">사진 미포함<br/>(클라우드 전송)</div>`;

                const card = document.createElement('div');
                card.className = 'tx-card';
                card.innerHTML = `
        <div class="tx-card-header">
          <div>
            <span class="tx-no">순번 #${historyData.length - idx}</span>
            <span class="tx-ts" style="margin-left:12px;">${dt.toLocaleString('ko-KR')}</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="op-badge op-${h.operationType}">${h.operationType}</span>
            <span class="tx-ok" style="margin-right:4px;">✅ 수신완료</span>
            <button onclick="deleteItem(${idx})" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:var(--sec); cursor:pointer; font-size:0.8rem; padding:4px 8px;" title="이 기록 삭제">삭제</button>
          </div>
        </div>
        <div class="tx-card-body">
          ${imgHtml}
          <div class="tx-seals">${sealsHtml}</div>
        </div>
        <div class="tx-meta" style="flex-direction:column; gap:6px;">
          <div>
            <span>터미널: ${h.terminalCode}</span>
            <span>작업자: ${h.operatorId}</span>
            <span>전송 데이터 인증 완료</span>
          </div>
          ${h.message ? `<div style="color:var(--yellow); font-weight:600; font-size:0.8rem;">📝 메모: ${h.message}</div>` : ''}
        </div>
      `;
                list.appendChild(card);
            });

            document.getElementById('sSeals').textContent = tSeals;
            document.getElementById('sConf').textContent = cCount ? (tConf / cCount).toFixed(1) + '%' : '—';
            document.getElementById('sToday').textContent = today;
        }

        renderAll(); // 초기 렌더링
    </script>
</body>

</html>
