<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0f1e" />
    <title>TOS Dashboard | SealScan</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0f1e;
            --bg2: #0d1528;
            --card: #111827;
            --blue: #3b82f6;
            --cyan: #06b6d4;
            --green: #10b981;
            --yellow: #f59e0b;
            --orange: #f97316;
            --red: #ef4444;
            --text: #f1f5f9;
            --sec: #94a3b8;
            --muted: #475569;
            --border: rgba(255, 255, 255, 0.07);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        }

        /* ── TOP BAR ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hdr-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .hdr-title {
            font-size: 1rem;
            font-weight: 800;
        }

        .hdr-sub {
            font-size: 0.7rem;
            color: var(--muted);
            display: block;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 8px 14px;
            color: var(--sec);
            text-decoration: none;
            font-size: 0.82rem;
            transition: all .2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--sec);
            font-size: 0.82rem;
            margin-bottom: 24px;
        }

        /* ── STATS ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        @media(min-width:600px) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .stat.blue {
            border-top: 2px solid var(--blue);
        }

        .stat.green {
            border-top: 2px solid var(--green);
        }

        .stat.cyan {
            border-top: 2px solid var(--cyan);
        }

        .stat.yellow {
            border-top: 2px solid var(--yellow);
        }

        .stat-lbl {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 6px;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat.blue .stat-val {
            color: var(--blue);
        }

        .stat.green .stat-val {
            color: var(--green);
        }

        .stat.cyan .stat-val {
            color: var(--cyan);
        }

        .stat.yellow .stat-val {
            color: var(--yellow);
        }

        .stat-note {
            font-size: 0.7rem;
            color: var(--sec);
            margin-top: 2px;
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .sec-title {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .ctrl-btns {
            display: flex;
            gap: 8px;
        }

        .btn-ref {
            background: linear-gradient(135deg, var(--blue), #2563eb);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* ── CARDS ── */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tx-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: card-in .3s ease;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .tx-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
        }

        .tx-no {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--muted);
        }

        .tx-ts {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--sec);
        }

        .tx-badges {
            display: flex;
            gap: 6px;
        }

        .op-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .op-IMPORT {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
        }

        .op-EXPORT {
            background: rgba(245, 158, 11, 0.15);
            color: #fde68a;
        }

        .op-TRANSSHIP {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
        }

        .tx-ok {
            font-size: 0.68rem;
            color: var(--green);
        }

        .tx-card-body {
            display: flex;
            gap: 14px;
            padding: 12px 16px;
        }

        /* Photo */
        .tx-photo {
            width: 90px;
            height: 76px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
            background: #000;
        }

        .tx-photo-placeholder {
            width: 90px;
            height: 76px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            color: var(--muted);
        }

        /* Seals chips */
        .tx-seals {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        .seal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
        }

        .seal-line-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
            letter-spacing: .04em;
        }

        .badge-ym {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .badge-hmm {
            background: rgba(6, 182, 212, 0.15);
            color: #67e8f9;
        }

        .badge-hl {
            background: rgba(249, 115, 22, 0.15);
            color: #fdba74;
        }

        .badge-oth {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
        }

        .seal-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: .88rem;
            font-weight: 700;
            color: var(--text);
        }

        .seal-conf {
            font-size: .68rem;
            color: var(--green);
        }

        /* meta row */
        .tx-meta {
            display: flex;
            gap: 3px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            flex-wrap: wrap;
        }

        .tx-meta span {
            margin-right: 14px;
        }

        /* Photo modal */
        .photo-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .photo-modal.show {
            display: flex;
        }

        .photo-modal img {
            max-width: 95vw;
            max-height: 90vh;
            border-radius: 12px;
        }

        .photo-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 1.4rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty p {
            font-size: .88rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <header>
        <div class="hdr-left">
            <div class="hdr-logo">📡</div>
            <div>
                <span class="hdr-title">TOS Dashboard</span>
                <span class="hdr-sub">씰 스캔 전송 기록</span>
            </div>
        </div>
        <a href="index.html" class="btn-back">← 스캐너</a>
    </header>

    <main>
        <h1>📋 TOS 전송 기록</h1>
        <p class="subtitle" id="subtitle">마지막 업데이트: —</p>

        <!-- Stats -->
        <div class="stats">
            <div class="stat blue">
                <div class="stat-lbl">총 전송</div>
                <div class="stat-val" id="sTotal">0</div>
                <div class="stat-note">전체 전송 건수</div>
            </div>
            <div class="stat green">
                <div class="stat-lbl">씰 수</div>
                <div class="stat-val" id="sSeals">0</div>
                <div class="stat-note">총 인식 씰</div>
            </div>
            <div class="stat cyan">
                <div class="stat-lbl">평균 신뢰도</div>
                <div class="stat-val" id="sConf">—</div>
                <div class="stat-note">OCR 정확도</div>
            </div>
            <div class="stat yellow">
                <div class="stat-lbl">오늘</div>
                <div class="stat-val" id="sToday">0</div>
                <div class="stat-note">오늘 전송</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <span class="sec-title">전송 기록</span>
            <div class="ctrl-btns">
                <button class="btn-ref" onclick="load()">🔄 새로고침</button>
                <button class="btn-del" onclick="clearAll()">삭제</button>
            </div>
        </div>

        <!-- Cards list -->
        <div class="cards-list" id="cardsList"></div>
        <div class="empty" id="emptyState" style="display:none">
            <div class="empty-icon">📭</div>
            <p>전송 기록이 없습니다.<br />스캐너 앱에서 씰을 스캔하고<br />TOS 전송 버튼을 눌러 주세요.</p>
        </div>
    </main>

    <!-- Photo lightbox -->
    <div class="photo-modal" id="photoModal" onclick="closePhoto()">
        <button class="photo-modal-close">✕</button>
        <img id="photoModalImg" src="" alt="seal capture" />
    </div>

    <script>
        function lineClass(num) {
            if (!num) return 'badge-oth';
            if (num.startsWith('YMAM')) return 'badge-ym';
            if (/^\d{2}\s/.test(num)) return 'badge-hmm';
            if (num.startsWith('HLC')) return 'badge-hl';
            return 'badge-oth';
        }
        function lineName(num) {
            if (!num) return '—';
            if (num.startsWith('YMAM')) return 'YM';
            if (/^\d{2}\s/.test(num)) return 'HMM';
            if (num.startsWith('HLC')) return 'HL';
            return 'OTHER';
        }

        function openPhoto(src) {
            document.getElementById('photoModalImg').src = src;
            document.getElementById('photoModal').classList.add('show');
        }
        function closePhoto() {
            document.getElementById('photoModal').classList.remove('show');
        }

        function load() {
            const history = JSON.parse(localStorage.getItem('sealScanHistory') || '[]');
            const list = document.getElementById('cardsList');
            const empty = document.getElementById('emptyState');
            const today = new Date().toDateString();

            let totalSeals = 0, totalConf = 0, confCt = 0, todayCount = 0;
            history.forEach(h => {
                (h.seals || []).forEach(s => {
                    totalSeals++;
                    if (s.confidence) { totalConf += s.confidence; confCt++; }
                });
                if (new Date(h.timestamp).toDateString() === today) todayCount++;
            });

            document.getElementById('sTotal').textContent = history.length;
            document.getElementById('sSeals').textContent = totalSeals;
            document.getElementById('sConf').textContent = confCt ? (totalConf / confCt).toFixed(1) + '%' : '—';
            document.getElementById('sToday').textContent = todayCount;
            document.getElementById('subtitle').textContent = `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

            if (!history.length) {
                list.innerHTML = ''; empty.style.display = 'block'; return;
            }
            empty.style.display = 'none';
            list.innerHTML = '';

            history.forEach((h, idx) => {
                const n = history.length - idx;
                const dt = new Date(h.timestamp);
                const dateStr = dt.toLocaleDateString('ko-KR');
                const timeStr = dt.toLocaleTimeString('ko-KR');
                const hasPhoto = !!h.capturedImage;

                const sealsHtml = (h.seals || []).map(s => `
        <div class="seal-row">
          <span class="seal-line-badge ${lineClass(s.sealNumber)}">${s.shippingLine || lineName(s.sealNumber)}</span>
          <span class="seal-num">${s.sealNumber || '—'}</span>
          <span class="seal-conf">${s.confidence || ''}%</span>
        </div>
      `).join('');

                const photoHtml = hasPhoto
                    ? `<img class="tx-photo" src="${h.capturedImage}" alt="seal" onclick="event.stopPropagation();openPhoto('${h.capturedImage}')" style="cursor:pointer" title="클릭해서 확대"/>`
                    : `<div class="tx-photo-placeholder">📷</div>`;

                const card = document.createElement('div');
                card.className = 'tx-card';
                card.innerHTML = `
        <div class="tx-card-header">
          <div>
            <div class="tx-no">전송 #${n}</div>
            <div class="tx-ts">${dateStr} ${timeStr}</div>
          </div>
          <div class="tx-badges">
            <span class="op-badge op-${h.operationType || 'IMPORT'}">${h.operationType || 'IMPORT'}</span>
            <span class="tx-ok">✅ 전송완료</span>
          </div>
        </div>
        <div class="tx-card-body">
          ${photoHtml}
          <div class="tx-seals">${sealsHtml}</div>
        </div>
        <div class="tx-meta">
          <span>터미널: ${h.terminalCode || '—'}</span>
          <span>담당자: ${h.operatorId || '—'}</span>
          <span>씰 수: ${(h.seals || []).length}개</span>
        </div>
      `;
                list.appendChild(card);
            });
        }

        function clearAll() {
            if (!confirm('전송 기록을 모두 삭제하시겠습니까?')) return;
            localStorage.removeItem('sealScanHistory');
            load();
        }

        load();
        setInterval(load, 15000);
    </script>
</body>

</html>
